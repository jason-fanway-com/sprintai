[build]
  # Assemble ONLY the public marketing/app surface into ./public, then publish
  # that dir. The origin therefore serves an explicit allowlist — internal
  # source (admin-dashboard/, supabase/, *.md, *.htmltext, _proof/, scripts,
  # specs, etc.) is never on the origin. See scripts/build-public-site.sh.
  command   = "npm install && bash scripts/build-public-site.sh"
  publish   = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirect /webhook → Netlify function (cleaner URL for Stripe dashboard)
[[redirects]]
  from = "/webhook"
  to   = "/.netlify/functions/stripe-webhook"
  status = 200

[[redirects]]
  from = "/create-checkout-session"
  to   = "/.netlify/functions/create-checkout-session"
  status = 200

[[redirects]]
  from = "/sms-webhook"
  to   = "/.netlify/functions/sms-webhook"
  status = 200

# NOTE: the legacy /admin CRM and /dashboard/* admin SPA redirects were removed.
# Those are INTERNAL tools and are intentionally no longer served from the
# public root origin (they are not copied into ./public by the assembler). The
# admin dashboard ships from its OWN Netlify site (admin-dashboard/, publish=dist).
