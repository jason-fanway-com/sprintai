[build]
  # Assemble ONLY the public marketing/app surface into ./public, then publish
  # that dir. The origin therefore serves an explicit allowlist — internal
  # source (admin-dashboard/, supabase/, *.md, *.htmltext, _proof/, scripts,
  # specs, etc.) is never on the origin. See scripts/build-public-site.sh.
  command   = "npm install && bash scripts/build-public-site.sh"
  publish   = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirect /webhook → Netlify function (cleaner URL for Stripe dashboard)
[[redirects]]
  from = "/webhook"
  to   = "/.netlify/functions/stripe-webhook"
  status = 200

[[redirects]]
  from = "/create-checkout-session"
  to   = "/.netlify/functions/create-checkout-session"
  status = 200

[[redirects]]
  from = "/sms-webhook"
  to   = "/.netlify/functions/sms-webhook"
  status = 200

# Admin dashboard (incl. Command Center) is a SEPARATE, login-gated Netlify
# site (sprintai-chat-admin). It is intentionally NOT copied into ./public.
# These proxy rewrites let staff reach the gated admin via getsprintai.com/admin
# WITHOUT putting any admin source on the root origin: Netlify proxies the
# request to the external admin site at request time. Auth still happens on the
# admin app (Supabase login) — the proxy exposes nothing that login doesn't.
# The admin SPA is built with <BrowserRouter basename="/dashboard">, so it ONLY
# works when the browser URL is under /dashboard. We therefore proxy /dashboard/*
# (the app's real base) and make /admin a friendly REDIRECT (301) to /dashboard
# so the address bar becomes /dashboard and the client router matches.
[[redirects]]
  from = "/admin"
  to = "/dashboard/"
  status = 301
  force = true

[[redirects]]
  from = "/admin/*"
  to = "/dashboard/:splat"
  status = 301
  force = true

# Proxy the gated admin site under its own /dashboard base (preserves basename).
# :splat keeps the full client path so deep links + SPA fallback work.
[[redirects]]
  from = "/dashboard/*"
  to = "https://sprintai-chat-admin.netlify.app/dashboard/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/dashboard"
  to = "https://sprintai-chat-admin.netlify.app/dashboard/"
  status = 200
  force = true

[[redirects]]
  from = "/vite.svg"
  to = "https://sprintai-chat-admin.netlify.app/vite.svg"
  status = 200
