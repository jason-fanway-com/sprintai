# A string used to distinguish different Supabase projects on the same host.
project_id = "sprintai-chat"

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "https://app.getsprintai.com"
additional_redirect_urls = ["http://localhost:3010", "https://app.getsprintai.com"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[functions.chat-sms]
verify_jwt = false  # Twilio webhooks don't send JWT

[functions.onboard-tenant]
verify_jwt = false  # Called internally with service key

[functions.stripe-webhook]
verify_jwt = false  # Stripe webhooks don't send JWT

[functions.create-checkout]
verify_jwt = false  # Called from public signup page

[functions.toast-order]
verify_jwt = false  # Called internally

[functions.train-tenant]
verify_jwt = false  # Called from public dashboard

[functions.admin-api]
verify_jwt = true   # Requires admin JWT

[functions.merchant-auth]
verify_jwt = false  # Public PIN verify; real gate is server-side PIN + HMAC session token
